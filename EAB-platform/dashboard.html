<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAB Platform | Premium Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --accent: #3b82f6;
            --text: #f8fafc;
            --gradient: linear-gradient(135deg, #3b82f6 0%, #2dd4bf 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        /* Sidebar الفاخر */
        .sidebar {
            width: 280px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255,255,255,0.1);
            height: 100vh;
            position: fixed;
            right: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 900;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 50px;
            text-align: center;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 18px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            border-radius: 15px;
            margin-bottom: 10px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-item i { font-size: 1.2rem; }
        .menu-item:hover, .menu-item.active {
            background: rgba(59, 132, 246, 0.15);
            color: var(--accent);
            transform: translateX(-10px);
        }

        /* المحتوى الرئيسي */
        .main-content {
            margin-right: 280px;
            width: calc(100% - 280px);
            padding: 40px;
        }

        /* الهيدر العلوي */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 20px;
            background: var(--glass);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .user-profile { display: flex; align-items: center; gap: 15px; }
        .avatar {
            width: 50px;
            height: 50px;
            background: var(--gradient);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        /* الإحصائيات الفاخرة */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--glass);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
            transition: 0.4s;
        }

        .stat-card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .stat-card h3 { font-size: 2.5rem; font-weight: 900; margin-bottom: 5px; }
        .stat-card p { color: #94a3b8; font-weight: 600; }
        .stat-card .icon-bg {
            position: absolute;
            left: -10px;
            bottom: -10px;
            font-size: 5rem;
            color: rgba(59, 130, 246, 0.05);
        }

        /* قسم إضافة الطلبات */
        .glass-input-box {
            background: var(--glass);
            padding: 30px;
            border-radius: 25px;
            margin-bottom: 40px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .glass-input-box h2 { margin-bottom: 20px; font-weight: 900; }

        input {
            width: 100%;
            padding: 20px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            color: white;
            font-size: 1.1rem;
            margin-bottom: 20px;
            outline: none;
        }

        .premium-btn {
            padding: 18px 40px;
            background: var(--gradient);
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
        }

        .premium-btn:hover { transform: scale(1.02); opacity: 0.9; }

        /* قائمة الطلبات المتحركة */
        .order-item {
            background: var(--glass);
            padding: 25px;
            border-radius: 22px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.03);
            animation: fadeInRight 0.5s ease forwards;
        }

        .badge {
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 900;
        }

        .badge.pending { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .badge.done { background: rgba(16, 185, 129, 0.1); color: #10b981; }

        .action-btns button {
            background: rgba(255,255,255,0.05);
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            margin-right: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .action-btns .btn-done:hover { background: #10b981; }
        .action-btns .btn-del:hover { background: #ef4444; }

        @media (max-width: 900px) {
            .sidebar { display: none; }
            .main-content { margin-right: 0; width: 100%; padding: 20px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">EAB System</div>
        <nav>
            <a href="#" class="menu-item active"><i class="fas fa-chart-pie"></i> الرئيسية</a>
            <a href="#" class="menu-item"><i class="fas fa-folder-open"></i> ملفاتي</a>
            <a href="#" class="menu-item"><i class="fas fa-bell"></i> التنبيهات</a>
            <a href="#" class="menu-item"><i class="fas fa-cog"></i> الإعدادات</a>
        </nav>
        <div style="margin-top: auto;">
            <a href="#" onclick="logout()" class="menu-item" style="color: #ef4444;"><i class="fas fa-power-off"></i> خروج</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-nav animate__animated animate__fadeInDown">
            <div>
                <h1 style="font-weight: 900;">لوحة التحكم</h1>
                <p style="color: #94a3b8;">إدارة ذكية لطلباتك الأكاديمية</p>
            </div>
            <div class="user-profile">
                <div style="text-align: left;">
                    <p id="user-display" style="font-weight: 900;">...</p>
                    <small style="color: #94a3b8;">أخصائية ممتازة</small>
                </div>
                <div class="avatar" id="avatar-letter">G</div>
            </div>
        </header>

        <div class="stats-container">
            <div class="stat-card animate__animated animate__fadeInUp" style="animation-delay: 0.1s;">
                <i class="icon-bg fas fa-rocket"></i>
                <h3 id="stat-pending">0</h3>
                <p>طلبات نشطة</p>
            </div>
            <div class="stat-card animate__animated animate__fadeInUp" style="animation-delay: 0.2s;">
                <i class="icon-bg fas fa-check-circle"></i>
                <h3 id="stat-done">0</h3>
                <p>تم تسليمها</p>
            </div>
            <div class="stat-card animate__animated animate__fadeInUp" style="animation-delay: 0.3s;">
                <i class="icon-bg fas fa-wallet"></i>
                <h3>٤٥٠</h3>
                <p>الرصيد (ر.ع)</p>
            </div>
        </div>

        <section class="glass-input-box animate__animated animate__fadeInUp" style="animation-delay: 0.4s;">
            <h2>إضافة مشروع جديد 🔥</h2>
            <input type="text" id="orderInput" placeholder="اكتبي عنوان البحث أو الخدمة هنا...">
            <button class="premium-btn" onclick="addOrder()">إرسال الطلب للنظام</button>
        </section>

        <div id="ordersList">
            </div>
    </main>

    <script>
        // نظام البيانات والتحقق
        const user = localStorage.getItem("user") || "أخصائية";
        document.getElementById("user-display").innerText = user;
        document.getElementById("avatar-letter").innerText = user.charAt(0).toUpperCase();

        let orders = JSON.parse(localStorage.getItem("orders")) || [];

        function saveAndRender() {
            localStorage.setItem("orders", JSON.stringify(orders));
            render();
        }

        function addOrder() {
            const input = document.getElementById("orderInput");
            if(!input.value) return;
            orders.unshift({ id: Date.now(), title: input.value, status: "pending" });
            input.value = "";
            saveAndRender();
        }

        function toggleStatus(id) {
            orders = orders.map(o => {
                if(o.id === id) o.status = (o.status === 'pending' ? 'done' : 'pending');
                return o;
            });
            saveAndRender();
        }

        function deleteOrder(id) {
            orders = orders.filter(o => o.id !== id);
            saveAndRender();
        }

        function render() {
            const list = document.getElementById("ordersList");
            list.innerHTML = orders.map((o, index) => `
                <div class="order-item" style="animation-delay: ${index * 0.1}s">
                    <div>
                        <h4 style="font-weight: 700; margin-bottom: 5px;">${o.title}</h4>
                        <span class="badge ${o.status}">${o.status === 'done' ? 'مكتمل' : 'قيد المعالجة'}</span>
                    </div>
                    <div class="action-btns">
                        <button class="btn-done" onclick="toggleStatus(${o.id})"><i class="fas fa-check"></i></button>
                        <button class="btn-del" onclick="deleteOrder(${o.id})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join("");

            // تحديث الإحصائيات
            document.getElementById("stat-pending").innerText = orders.filter(o => o.status === 'pending').length;
            document.getElementById("stat-done").innerText = orders.filter(o => o.status === 'done').length;
        }

        function logout() {
            localStorage.removeItem("user");
            window.location.href = "login.html";
        }

        render();
    </script>
</body>
</html>
